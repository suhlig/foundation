- name: Software is installed
  ansible.builtin.apt:
    update_cache: yes
    name:
      - apt-transport-https
      - aptitude # required for upgrade mode 'full'
      - sudo
  tags: [apt, software]
- name: software-properties-common is installed on Debian < 13
  ansible.builtin.apt:
    name: software-properties-common
  when: ansible_distribution == "Debian" and ansible_distribution_major_version < "13"
  tags: [apt, software]
- name: Software is fully upgraded
  ansible.builtin.apt:
    upgrade: full
  tags: [apt, upgrade]
- name: Preferred locale exists
  ansible.builtin.locale_gen:
    name: en_US.UTF-8
    state: present
  tags: [l10n, i18n, locale]
