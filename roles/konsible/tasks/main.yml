---
- name: Go image is built locally
  delegate_to: localhost
  become: false
  ansible.builtin.command: |
    go tool ko build --local --platform={{ konsible_platform }} {{ konsible_package }}
  register: ko_build
  changed_when: true
- name: image fact is set
  set_fact: { konsible_image: "{{ ko_build.stdout }}" }
- name: pussh installation is verified
  delegate_to: localhost
  become: false
  ansible.builtin.command: docker pussh --help
  register: pussh_check
  ignore_errors: true
  changed_when: false
- name: pussh is installed
  delegate_to: localhost
  become: false
  ansible.builtin.fail:
    msg: |
      The 'pussh' docker plugin is not installed. Please install it to proceed.

      Refer to https://github.com/psviderski/unregistry for details.
  when: pussh_check.rc != 0
- name: image is pushed to remote
  delegate_to: localhost
  become: false
  command: "docker pussh {{ konsible_image }} {{ ansible_user }}@{{ ansible_host }}"
  changed_when: true
- name: container is running
  community.docker.docker_container:
    name: "{{ konsible_app_name }}"
    image: "{{ konsible_image }}"
    state: started
    detach: true
    restart: true
    restart_policy: always
    networks: [ name: "{{ konsible_docker_network }}" ]
    labels: |
      {{
        {
          'traefik.enable': 'true',
          'traefik.http.routers.' ~ konsible_app_name ~ '.rule': 'Host(`' ~ konsible_app_name ~ '.' ~ konsible_domain ~ '`)',
          'traefik.http.routers.' ~ konsible_app_name ~ '.entrypoints': 'websecure',
          'traefik.http.routers.' ~ konsible_app_name ~ '.tls.certresolver': 'letsencrypt',
          'traefik.http.services.' ~ konsible_app_name ~ '.loadbalancer.server.port': konsible_port | string
        } | combine(konsible_labels)
      }}
- name: app is reachable
  uri:
    url: "https://{{ konsible_app_name }}.{{ konsible_domain }}"
    status_code: 200
  register: app_check
  until: app_check.status == 200
  retries: 5
  delay: 2
